# Model Training Configuration
# Resource-specific values should go in config.local.yaml (gitignored)

# AWS Configuration
aws:
  profile: null  # Set in config.local.yaml or use environment

# DynamoDB Configuration
dynamodb:
  table_name: null  # REQUIRED - set in config.local.yaml
  batch_size: 25

# S3 Configuration
s3:
  bucket: null  # REQUIRED - set in config.local.yaml
  cropped_images_prefix: needle-cam/cropped-images
  models_prefix: models
  analysis_prefix: analysis
  manifests_prefix: manifests

# Manifest Configuration
manifest:
  base_url: null  # Set in config.local.yaml
  confidence_threshold: 0.95

# Cache Configuration (downloaded data)
cache:
  images_dir: ./cache/images
  manifests_dir: ./cache/manifests

# Training Configuration
training:
  frame_state_model_version: 1
  visibility_model_version: 1
  epochs: 8
  batch_size: 32
  learning_rate: 0.001
  train_split: 0.8
  random_seed: 42
  num_workers: 0

# Image Configuration
image:
  width: 224
  height: 224
  normalization:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# Frame State Classification (4 classes)
frame_state:
  labels:
    - "good"
    - "dark"
    - "bad"
    - "off_target"
  label_to_index:
    good: 0
    dark: 1
    bad: 2
    off_target: 3

# Visibility Classification (3 classes)
visibility:
  labels:
    - "out"
    - "partially_out"
    - "not_out"
  label_to_index:
    out: 0
    partially_out: 1
    not_out: 2

# ONNX Export Configuration
onnx:
  opset_version: 14
  input_names: ["input_image"]
  output_names: ["output_probability"]

# Output Configuration (generated artifacts)
output:
  models_dir: ./output/models
  checkpoints_dir: ./output/checkpoints
  logs_dir: ./output/logs
